services:
  n8n-postgres:
    image: postgres:16
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: N8nPg_2025_Strong!Local
      POSTGRES_DB: n8n
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped

    # TEMPORARY – remove after confirmed working
    ports:
      - "5678:5678"

    environment:
      # Cloudflare / HTTPS
      N8N_HOST: n8n.hivehq.nz
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.hivehq.nz
      N8N_SECURE_COOKIE: true

      # Runtime
      NODE_ENV: production

      # UI Auth
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: 73s95dFG1!

      # Encryption (DO NOT CHANGE)
      N8N_ENCRYPTION_KEY: ee98cd2df77b854eced8319852b4e64820f5fb8c16f6a431c44b6

      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: N8nPg_2025_Strong!Local

    volumes:
      - ./data/n8n:/home/node/.n8n

    depends_on:
      - n8n-postgres
